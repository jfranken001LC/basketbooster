# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "63fca6eb9dd47c18f39e2eaf9f79e96e"
name = "Basket Booster Discounts"
application_url = "https://app.basketbooster.ca"
embedded = true
handle = "basket-booster-discounts"

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_discounts"

[auth]
redirect_urls = ["https://app.basketbooster.ca/auth/callback"]

[discount.metafields.app.function-configuration]
type = "json"
name = "Function configuration"

  [discount.metafields.app.function-configuration.access]
  admin = "merchant_read_write"
  storefront = "none"
